<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title> 코인 거래소 </title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .dashboard { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #ffce00; color: #000; }
        .price { font-weight: bold; color: #007bff; font-size: 1.2rem; }
        .status { margin-top: 20px; font-size: 0.8rem; color: #888; }
        .loading { color: #ff9f43; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1> 코인 실시간 시세표 </h1>
        <table>
            <thead>
                <tr>
                    <th>코인</th>
                    <th>현재가 (USD)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>비트코인 (BTC)</td>
                    <td id="btc-price" class="price loading">데이터 호출 중...</td>
                </tr>
                <tr>
                    <td>이더리움 (ETH)</td>
                    <td id="eth-price" class="price loading">데이터 호출 중...</td>
                </tr>
            </tbody>
        </table>
        <div class="status" id="last-update">마지막 업데이트: 확인 중...</div>
    </div>

    <script>
        async function updatePrices() {
            const btcElement = document.getElementById('btc-price');
            const ethElement = document.getElementById('eth-price');
            const timeElement = document.getElementById('last-update');

            try {
                // 1. CoinGecko API 호출 (비트코인, 이더리움 가격 요청)
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
                const data = await response.json();

                // 2. 화면의 숫자 업데이트 (소수점과 콤마 처리)
                btcElement.innerText = '$' + data.bitcoin.usd.toLocaleString();
                ethElement.innerText = '$' + data.ethereum.usd.toLocaleString();
                
                // 로딩 스타일 제거
                btcElement.classList.remove('loading');
                ethElement.classList.remove('loading');

                // 3. 업데이트 시간 표시
                const now = new Date();
                timeElement.innerText = '마지막 업데이트: ' + now.toLocaleTimeString();

            } catch (error) {
                console.error('데이터를 가져오지 못했습니다:', error);
                timeElement.innerText = '업데이트 실패 (잠시 후 다시 시도합니다)';
            }
        }

        // 페이지가 열리자마자 실행
        updatePrices();

        // 30초(30,000ms)마다 자동으로 실행하여 실시간 업데이트
        setInterval(updatePrices, 30000);
    </script>
</body>
</html>

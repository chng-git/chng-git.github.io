<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title> 2026-1 블록체인 실습 - 시세표 </title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .dashboard { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #D8BFD8; color: #000; }
        .price { font-weight: bold; color: #007bff; font-size: 1.2rem; }
        
        /* 시간 표시 스타일 */
        .status-box { margin-top: 25px; padding: 10px; border-radius: 10px; background-color: #f8f9fa; font-size: 0.9rem; }
        .time-text { color: #2ecc71; font-weight: bold; } /* 성공 시 초록색 */
        .error-text { color: #e74c3c; font-size: 0.8rem; margin-top: 5px; } /* 실패 시 빨간색 */
    </style>
</head>
<body>
    <div class="dashboard">
        <h1> 실시간 시세표 </h1>
        <table>
            <thead>
                <tr>
                    <th>코인</th>
                    <th>현재가 (USD)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>비트코인 (BTC)</td>
                    <td id="btc-price" class="price">연결 중...</td>
                </tr>
                <tr>
                    <td>이더리움 (ETH)</td>
                    <td id="eth-price" class="price">연결 중...</td>
                </tr>
            </tbody>
        </table>

        <div class="status-box">
            <div>마지막 성공: <span id="last-success" class="time-text">-</span></div>
            <div id="error-msg" class="error-text"></div>
        </div>
    </div>

    <script>
        let lastTime = "-";

        async function updatePrices() {
            const btcElement = document.getElementById('btc-price');
            const ethElement = document.getElementById('eth-price');
            const timeElement = document.getElementById('last-success');
            const errorElement = document.getElementById('error-msg');

            try {
                // API 호출
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&t=' + Date.now());
                
                if (!response.ok) throw new Error('서버 응답 지연');

                const data = await response.json();

                // 1. 가격 업데이트
                btcElement.innerText = '$' + data.bitcoin.usd.toLocaleString();
                ethElement.innerText = '$' + data.ethereum.usd.toLocaleString();
                
                // 2. 성공 시간 기록 및 표시
                lastTime = new Date().toLocaleTimeString();
                timeElement.innerText = lastTime;
                
                // 3. 에러 메시지 초기화
                errorElement.innerText = "";
                console.log("업데이트 성공: " + lastTime);

            } catch (error) {
                console.error('업데이트 실패:', error);
                errorElement.innerText = "⚠️ 현재 서버 연결이 불안정하여 재시도 중입니다.";
            }
        }

        // 처음 실행
        updatePrices();

        // 2분마다 자동 실행
        setInterval(updatePrices, 120000);
    </script>
</body>
</html>
